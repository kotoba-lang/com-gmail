name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: clojure -M:test
      - run: clojure -M:lint
      # cljs-only async read surface (gmail.async-*) -- nbb tests
      - run: npm ci
      - run: npm run test:nbb
